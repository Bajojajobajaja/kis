name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Format check
        run: |
          go run ./scripts/dev/run-in-modules.go -- go fmt ./...
          if ! git diff --quiet -- '*.go'; then
            echo "Go files are not formatted."
            git --no-pager diff -- '*.go'
            exit 1
          fi

      - name: Lint
        run: go run ./scripts/dev/run-in-modules.go -- golangci-lint run ./...

      - name: Test
        run: go run ./scripts/dev/run-in-modules.go -- go test ./...

      - name: Build
        run: go run ./scripts/dev/run-in-modules.go -- go build ./...

  db-quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kis
          POSTGRES_PASSWORD: kis
          POSTGRES_DB: kis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U kis -d kis_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
      DB_USER: kis
      DB_PASSWORD: kis
      DB_NAME: kis_test
      DB_SSLMODE: disable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.work

      - name: Wait for PostgreSQL
        run: |
          for attempt in {1..30}; do
            if (echo > /dev/tcp/127.0.0.1/5432) >/dev/null 2>&1; then
              echo "PostgreSQL is ready."
              exit 0
            fi
            echo "Waiting for PostgreSQL (attempt ${attempt}/30)..."
            sleep 2
          done
          echo "PostgreSQL did not become ready in time."
          exit 1

      - name: DB-tagged tests
        run: make db-test

      - name: HTTP coverage threshold
        run: make coverage-check
