name: cd

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        required: true
        options:
          - dev
          - stage
          - prod

permissions:
  contents: read

jobs:
  validate-manifests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.31.0

      - name: Validate kustomize overlays
        run: |
          kubectl kustomize infra/k8s/overlays/dev > /dev/null
          kubectl kustomize infra/k8s/overlays/stage > /dev/null
          kubectl kustomize infra/k8s/overlays/prod > /dev/null

  deploy-manual:
    if: github.event_name == 'workflow_dispatch'
    needs: validate-manifests
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.31.0

      - name: Select kubeconfig secret
        id: kubeconfig
        run: |
          case "${{ inputs.environment }}" in
            dev)
              echo "secret_name=KUBE_CONFIG_DEV" >> "$GITHUB_OUTPUT"
              ;;
            stage)
              echo "secret_name=KUBE_CONFIG_STAGE" >> "$GITHUB_OUTPUT"
              ;;
            prod)
              echo "secret_name=KUBE_CONFIG_PROD" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_B64: ${{ secrets[steps.kubeconfig.outputs.secret_name] }}
        run: |
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_B64" | base64 -d > "$HOME/.kube/config"

      - name: Apply selected overlay
        run: kubectl apply -k infra/k8s/overlays/${{ inputs.environment }}
