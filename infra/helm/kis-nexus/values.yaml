createNamespace: true
namespace: kis-nexus

replicaCount: 3

image:
  repository: ghcr.io/kis-nexus/api-gateway
  pullPolicy: IfNotPresent
  tag: stable

env:
  APP_ENV: prod
  LOG_LEVEL: info
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: nginx
  host: api.kis.example.com
  path: /
  pathType: Prefix
  tls:
    enabled: true
    secretName: kis-api-gateway-tls

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 65

pdb:
  enabled: true
  minAvailable: 1

