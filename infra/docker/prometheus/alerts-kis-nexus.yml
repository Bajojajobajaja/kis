groups:
  - name: kis-nexus-slo
    rules:
      - alert: KISHigh5xxErrorRate
        expr: |
          (
            sum(rate(http_server_requests_total{status=~"5.."}[5m]))
            /
            clamp_min(sum(rate(http_server_requests_total[5m])), 1)
          ) > 0.02
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "5xx error rate is above 2% for 10m"
          description: "Error budget burn is too high for API traffic."

      - alert: KISVeryHigh5xxErrorRate
        expr: |
          (
            sum(rate(http_server_requests_total{status=~"5.."}[5m]))
            /
            clamp_min(sum(rate(http_server_requests_total[5m])), 1)
          ) > 0.05
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "5xx error rate is above 5% for 5m"
          description: "User-facing reliability is degraded and requires immediate response."

      - alert: KISHighP95Latency
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(http_server_request_duration_seconds_bucket[5m])) by (le)
          ) > 0.75
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "P95 latency above 750ms for 10m"
          description: "Response latency exceeds the service objective."

      - alert: KISAvailabilitySLOBurnRateFast
        expr: |
          (
            1 -
            (
              sum(rate(http_server_requests_total{status!~"5.."}[5m]))
              /
              clamp_min(sum(rate(http_server_requests_total[5m])), 1)
            )
          ) > (1 - 0.995) * 14.4
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Fast burn-rate alert for availability SLO"
          description: "At this burn rate, the monthly error budget will exhaust quickly."

