apiVersion: v1
kind: Namespace
metadata:
  labels:
    app.kubernetes.io/part-of: kis-nexus
  name: kis-nexus
---
apiVersion: v1
kind: ResourceQuota
metadata:
  labels:
    app.kubernetes.io/part-of: kis-nexus
  name: namespace-budget
  namespace: kis-nexus
spec:
  hard:
    limits.cpu: "8"
    limits.memory: 8Gi
    pods: "50"
    requests.cpu: "4"
    requests.memory: 4Gi
---
apiVersion: v1
data:
  APP_ENV: dev
  LOG_LEVEL: debug
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/part-of: kis-nexus
  name: platform-settings
  namespace: kis-nexus
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: kis-nexus
  name: api-gateway
  namespace: kis-nexus
spec:
  ports:
  - name: http
    port: 80
    targetPort: http
  selector:
    app.kubernetes.io/name: api-gateway
---
apiVersion: v1
kind: LimitRange
metadata:
  labels:
    app.kubernetes.io/part-of: kis-nexus
  name: default-resource-limits
  namespace: kis-nexus
spec:
  limits:
  - default:
      cpu: 500m
      memory: 512Mi
    defaultRequest:
      cpu: 100m
      memory: 128Mi
    type: Container
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: kis-nexus
  name: api-gateway
  namespace: kis-nexus
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
    spec:
      containers:
      - envFrom:
        - configMapRef:
            name: platform-settings
        image: ghcr.io/kis-nexus/api-gateway:dev-latest
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /health/live
            port: http
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 2
        name: api-gateway
        ports:
        - containerPort: 8080
          name: http
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 2
        resources:
          limits:
            cpu: 250m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 96Mi
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  labels:
    app.kubernetes.io/part-of: kis-nexus
  name: api-gateway
  namespace: kis-nexus
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  labels:
    app.kubernetes.io/part-of: kis-nexus
  name: api-gateway
  namespace: kis-nexus
spec:
  maxReplicas: 2
  metrics:
  - resource:
      name: cpu
      target:
        averageUtilization: 70
        type: Utilization
    type: Resource
  minReplicas: 1
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    kubernetes.io/ingress.class: nginx
  labels:
    app.kubernetes.io/part-of: kis-nexus
  name: api-gateway
  namespace: kis-nexus
spec:
  rules:
  - host: api.dev.kis.local
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  labels:
    app.kubernetes.io/part-of: kis-nexus
  name: default-deny-ingress
  namespace: kis-nexus
spec:
  podSelector: {}
  policyTypes:
  - Ingress
