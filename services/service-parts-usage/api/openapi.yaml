openapi: 3.0.3
info:
  title: service-parts-usage API
  version: 0.1.0
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
  /readyz:
    get:
      summary: Readiness check
      responses:
        '200':
          description: OK
  /workorders/{id}/parts:
    get:
      summary: List reserved/consumed parts for workorder
      responses:
        '200':
          description: OK
    post:
      summary: Reserve, consume or return parts for workorder
      responses:
        '201':
          description: Created
        '409':
          description: Stock shortage (procurement request auto-created)
  /workorders/{id}/parts-plan:
    get:
      summary: Load normalized parts plan for workorder
      responses:
        '200':
          description: OK
    put:
      summary: Save normalized parts plan for workorder
      responses:
        '200':
          description: OK
  /workorders/{id}/writeoff:
    post:
      summary: Write off workorder parts or create procurement requests for shortages
      responses:
        '200':
          description: OK
  /stock:
    get:
      summary: List current parts stock for service consumption
      responses:
        '200':
          description: OK
  /procurement/requests:
    get:
      summary: List auto-generated procurement requests due to shortages
      responses:
        '200':
          description: OK
  /events:
    get:
      summary: List parts usage domain events
      responses:
        '200':
          description: OK
