openapi: 3.0.3
info:
  title: service-workorders API
  version: 0.1.0
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
  /readyz:
    get:
      summary: Readiness check
      responses:
        '200':
          description: OK
  /workorders:
    get:
      summary: List workorders
      responses:
        '200':
          description: OK
    post:
      summary: Create workorder
      responses:
        '201':
          description: Created
  /workorders/{id}/status:
    post:
      summary: Update workorder status
      responses:
        '200':
          description: OK
  /workorders/{id}/close:
    post:
      summary: Close workorder with saga and compensations
      responses:
        '200':
          description: OK
  /workorders/{id}/quality:
    post:
      summary: Save quality score/comment for a workorder
      responses:
        '200':
          description: OK
  /audit/trail:
    get:
      summary: List workorder audit events with before/after snapshots
      responses:
        '200':
          description: OK
  /notifications/outbox:
    get:
      summary: List service notifications generated by workorder events
      responses:
        '200':
          description: OK
  /kpi/service:
    get:
      summary: Service KPI panel for workload, SLA and repeat visits
      responses:
        '200':
          description: OK
